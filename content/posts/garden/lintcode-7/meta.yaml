summary:
  zh-CN: 一种基于遍历的解法：将树序列化为 `inorder + preorder`，用 `#` 分隔，然后递归重建。该方法仅在节点值唯一时成立。
  en: 'A traversal-based solution: serialize the tree as inorder + preorder, split
    with `#`, then rebuild it recursively. This works when node values are unique.'
