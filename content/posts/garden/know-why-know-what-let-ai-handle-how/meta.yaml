title:
  zh-CN: 知道为什么，知道做什么，把怎么做交给 AI
  en: Know Why, Know What, Let AI Handle How
summary:
  zh-CN: 在 AI 原生工作流中，瓶颈正从执行转向判断。一人公司要胜出，关键在于对为什么某件事值得存在，以及什么才算做好，有异乎寻常的清晰度。
  en: In an AI-native workflow, the bottleneck shifts from execution to judgment.
    A one-person company wins by being unusually clear on why something should exist
    and what good looks like.
