<!DOCTYPE html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Config-first portfolio and creator studio." />
    <title>Haoyu Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              accent: 'var(--accent)',
              'ide-bg': 'var(--ide-bg)',
              'ide-panel': 'var(--ide-panel)',
              'ide-border': 'var(--ide-border)',
              'ide-text': 'var(--ide-text)',
              'ide-text-dim': 'var(--ide-text-dim)',
            },
            fontFamily: {
              mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
              display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            },
            animation: {
              'cursor-blink': 'cursor-blink 1s step-end infinite',
            },
            keyframes: {
              'cursor-blink': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="overflow-hidden bg-ide-bg">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
  </html>
