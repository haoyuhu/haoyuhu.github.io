    apiBaseUrl: null
    localStudioEnabled: false
    chatEnabled: false
    publicSite: true
  studio:
    title:
      zh-CN: "本地创作控制台"
      en: "Local Creator Console"
    description:
      zh-CN: "导入简历、发布短文与长文、预览 bundle、运行校验。"
