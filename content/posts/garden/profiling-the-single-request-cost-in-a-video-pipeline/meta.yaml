title:
  zh-CN: 剖析视频流水线中单次请求的成本
  en: Profiling the Single-Request Cost in a Video Pipeline
summary:
  zh-CN: 测试过程中暴露出一个很有价值的失效模式：单个视频请求就能吃满一个 CPU 核心，而且内存会随着输入大小增长。下一步应该把成本拆分到 ffmpeg
    和算法两侧，先找出真正的瓶颈，再去优化，而不是靠猜。
  en: 'A useful failure mode surfaced during testing: one video request can saturate
    a single CPU core, and memory grows with input size. The right next step is to
    split the cost between ffmpeg and the algorithm, then optimize the real bottleneck
    instead of guessing.'
