  zh-CN: 本文介绍了一个经典的字典树（Trie）实现，支持插入、精确查找和前缀查找，所有输入均为小写字母a-z。内容涵盖节点设计、方法语义以及简洁的C++代码示例。
  en: This note presents a classic implementation of a Trie data structure supporting
