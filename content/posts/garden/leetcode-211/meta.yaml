  zh-CN: LeetCode 211：添加与搜索单词 - 高级数据结构设计
  en: 'LeetCode 211: Add and Search Word - Advanced Data Structure Design'
summary:
  zh-CN: 设计一种数据结构，支持添加单词和含通配符 '.' 的搜索操作。本文采用Trie树实现，兼顾精确匹配与模糊匹配，确保查询高效。
  en: Design a data structure that efficiently supports adding words and searching
    words with support for wildcard '.' characters. The solution leverages a Trie
