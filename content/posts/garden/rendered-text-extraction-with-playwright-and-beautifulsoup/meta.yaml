title:
  zh-CN: 使用 Playwright 和 BeautifulSoup 提取渲染后的文本
  en: Rendered text extraction with Playwright and BeautifulSoup
summary:
  zh-CN: 对于高度依赖 JavaScript 的页面，最简单且可靠的做法通常是：先让浏览器完成渲染，再解析最终得到的 HTML。它并不是完美的正文提取器，但作为第一步非常实用。
  en: 'For JavaScript-heavy pages, the simplest reliable move is often: let a browser
    render first, then parse the resulting HTML. It is not a perfect main-content
    extractor, but it is a very practical first pass.'
