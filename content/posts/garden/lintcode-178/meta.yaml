title:
  zh-CN: LintCode 178：图是否为有效树
  en: 'LintCode 178: Graph Valid Tree'
summary:
  zh-CN: 对于无向图，只需先检查 `edges.size() == n - 1`，再验证一次 DFS 能访问到所有节点，就足以判断它是否是一棵有效树。
  en: For an undirected graph, checking `edges.size() == n - 1` and then verifying
    that one DFS visits all nodes is enough to decide whether it is a valid tree.
